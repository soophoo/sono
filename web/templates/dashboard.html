<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sono</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js" defer></script>
    <script src="/static/app.js" defer></script>
</head>
<body>
    <header class="app-header">
        <h1>sono</h1>
        <p class="tagline">Node.js &amp; package manager toolkit</p>
    </header>
    <nav class="tabs">
        <a href="/" class="tab on">Node</a>
        <a href="/pm" class="tab">Package managers</a>
    </nav>
    <main class="content">
        <form id="filters" class="filters"
              hx-get="/versions" hx-target="#versions" hx-swap="innerHTML"
              hx-trigger="change[target.name!='q'], keyup changed delay:250ms">
            <input class="search" type="search" name="q" value="{{.Query}}"
                   placeholder="Search a version (e.g. 20.11)" autocomplete="off">
            <div class="segmented" role="group" aria-label="Version filter">
                <label>
                    <input type="radio" name="filter" value="all" {{if eq .Filter "all"}}checked{{end}}>All
                </label>
                <label>
                    <input type="radio" name="filter" value="lts" {{if eq .Filter "lts"}}checked{{end}}>LTS
                </label>
                <label>
                    <input type="radio" name="filter" value="nonlts" {{if eq .Filter "nonlts"}}checked{{end}}>Non-LTS
                </label>
                <label>
                    <input type="radio" name="filter" value="installed" {{if eq .Filter "installed"}}checked{{end}}>Installed
                </label>
            </div>
            <div class="segmented" role="group" aria-label="Granularity">
                <label>
                    <input type="radio" name="view" value="compact" {{if eq .View "compact"}}checked{{end}}>Compact
                </label>
                <label>
                    <input type="radio" name="view" value="all" {{if eq .View "all"}}checked{{end}}>All versions
                </label>
            </div>
        </form>
        <div id="versions">
            {{template "versions.html" .}}
        </div>
    </main>
</body>
</html>
