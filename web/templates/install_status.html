{{if .Error}}
<span class="install-error" title="{{.Error}}">failed</span>
<button class="btn-install"
        hx-post="/install?version={{.Version}}&filter={{.Filter}}&view={{.View}}&q={{.Query | urlquery}}&page={{.Page}}"
        hx-target="closest .actions" hx-swap="innerHTML">retry</button>
{{else if .Done}}
<span class="badge badge-installed"
      hx-get="/versions?filter={{.Filter}}&view={{.View}}&q={{.Query | urlquery}}&page={{.Page}}"
      hx-trigger="load delay:400ms" hx-target="#versions" hx-swap="innerHTML">installed</span>
{{else}}
<div class="install-progress"
     hx-get="/install/status?version={{.Version}}&filter={{.Filter}}&view={{.View}}&q={{.Query | urlquery}}&page={{.Page}}"
     hx-trigger="every 1s" hx-target="this" hx-swap="outerHTML">
    {{if and (eq .Stage "downloading") (gt .Total 0)}}
    <progress value="{{.Downloaded}}" max="{{.Total}}"></progress>
    <span class="install-pct">{{.Percent}} %</span>
    {{else}}
    <progress></progress>
    <span class="install-pct">{{.StageLabel}}</span>
    {{end}}
</div>
{{end}}
